<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Solution | Auth</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Creepster&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC6NRjkwiazA-aYF4okvnLW4qpCyMg8O9E",
            authDomain: "fir-f3d53.firebaseapp.com",
            databaseURL: "https://fir-f3d53-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fir-f3d53",
            storageBucket: "fir-f3d53.firebasestorage.app",
            messagingSenderId: "683707045028",
            appId: "1:683707045028:web:93990fa0de8767dda90231"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.auth = auth;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.updateProfile = updateProfile;
        window.sendEmailVerification = sendEmailVerification;
        window.signOut = signOut;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y pinch-zoom;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: background-color 0.2s ease;
        }
        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        main::-webkit-scrollbar {
            display: none;
        }
        /* Form containers - no card, no shadow, no border */
        .form-section {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: transparent;
        }
        .form-card {
            background: transparent;
            width: 100%;
        }
        input, .custom-select-trigger {
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .custom-file-upload {
            border: 2px dashed #e2e8f0;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background-color: #fff;
        }
        .custom-file-upload:hover {
            border-color: #6366f1;
            background-color: #f5f3ff;
        }
        #profilePreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .toast-notification {
            transition: opacity 0.25s ease-in-out, visibility 0.25s;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(4px);
            z-index: 999;
        }
        .toast-notification.show {
            opacity: 1;
            visibility: visible;
        }

        /* ----- LINE-STYLED LABELS (horizontal lines on both sides) ----- */
        .form-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            margin-top: 8px;
            letter-spacing: 0.5px;
            width: 100%;
        }
        .form-label::before,
        .form-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #cbd5e1;
        }
        .form-label::before {
            margin-right: 12px;
        }
        .form-label::after {
            margin-left: 12px;
        }

        /* ----- CUSTOM SELECT DROPDOWN (same as freeSolution) ----- */
        .custom-select-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        .custom-select-trigger {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 9999px;
            font-size: 0.95rem;
            outline: none;
            background-color: #fff;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .custom-select-trigger span:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .custom-select-trigger::after {
            content: "▼";
            font-size: 0.7rem;
            color: #64748b;
            transition: transform 0.2s;
            margin-left: 12px;
            flex-shrink: 0;
        }
        .custom-select-trigger.open::after {
            transform: rotate(180deg);
        }
        .custom-select-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            z-index: 50;
            display: none;
            max-height: 280px;
            overflow-y: auto;
        }
        .custom-select-dropdown.show {
            display: block;
        }
        .custom-select-option {
            padding: 12px 18px;
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .custom-select-option:last-child {
            border-bottom: none;
        }
        .custom-select-option:hover {
            background-color: #f1f5f9;
        }
        .custom-select-option.selected {
            background-color: #eef2ff;
            font-weight: 500;
        }

        /* Wider inputs */
        input, .custom-file-upload {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
            background-color: #fff;
        }
        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 9999px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .link-underline {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.9rem;
        }
        .link-underline a {
            color: #4f46e5;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 500;
        }
        .link-underline a:hover {
            color: #6366f1;
        }

        /* Post-login panel */
        .post-login-panel {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: transparent;
        }

        /* ----- DARK MODE OVERRIDES (matches freeSolution) ----- */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0f172a;
                color: #e2e8f0;
            }
            input, .custom-select-trigger, .custom-file-upload {
                background-color: #1e293b;
                border-color: #334155;
                color: #f1f5f9;
            }
            .custom-select-dropdown {
                background-color: #1e293b;
                border-color: #334155;
            }
            .custom-select-option {
                color: #e2e8f0;
                border-bottom-color: #334155;
            }
            .custom-select-option:hover {
                background-color: #2d3a4e;
            }
            .form-label {
                color: #cbd5e6;
            }
            .form-label::before,
            .form-label::after {
                background-color: #475569;
            }
            .custom-file-upload {
                background-color: #1e293b;
                border-color: #334155;
            }
            .link-underline a {
                color: #818cf8;
            }
        }
    </style>
</head>
<body>
    <main>
        <!-- Brand Logo (centered, subtle) -->
        <div class="mb-8 w-full max-w-md mx-auto">
            <img src="https://i.postimg.cc/bw2vK1BT/Blue_Minimalist.png" alt="Brand Logo" class="w-full h-auto object-contain rounded-xl" onerror="this.style.display='none'">
        </div>

        <!-- DYNAMIC CONTAINER: Sign In / Sign Up toggle area -->
        <div id="authFormsContainer" class="w-full">
            <!-- SIGN IN SECTION (visible by default) -->
            <div id="signinSection" class="form-section">
                <div class="form-card">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-8 text-center tracking-tight">SIGN IN</h2>
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <div class="form-label">ENTER EMAIL</div>
                            <input type="email" id="loginEmail" placeholder="--Enter Email--" required>
                        </div>
                        <div>
                            <div class="form-label">ENTER PASSWORD</div>
                            <input type="password" id="loginPassword" placeholder="--Enter Password--" required>
                        </div>
                        <button type="submit" id="loginBtn" class="btn-primary bg-indigo-600 hover:bg-indigo-700 text-white shadow-md">
                            SIGN IN
                        </button>
                    </form>
                    <div class="link-underline">
                        <a id="getStartedLink">Get Started</a>
                    </div>
                </div>
            </div>

            <!-- SIGN UP SECTION (hidden initially) -->
            <div id="signupSection" class="form-section" style="display: none;">
                <div class="form-card">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-8 text-center tracking-tight">SIGN UP</h2>
                    <form id="registerForm" class="space-y-5">
                        <div>
                            <div class="form-label">USER NAME</div>
                            <input type="text" id="regName" placeholder="--Enter User Name--" required>
                        </div>
                        <div>
                            <div class="form-label">ENTER EMAIL</div>
                            <input type="email" id="regEmail" placeholder="--Enter Email--" required>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <div class="form-label">SET PASSWORD</div>
                                <input type="password" id="regPassword" placeholder="--Set Password--" required>
                            </div>
                            <div>
                                <div class="form-label">RE—ENTER PASSWORD</div>
                                <input type="password" id="regConfirmPassword" placeholder="--Re—Enter Password--" required>
                            </div>
                        </div>
                        <div>
                            <div class="form-label">UPLOAD PROFILE PHOTO</div>
                            <label class="custom-file-upload flex flex-col items-center justify-center w-full h-36 rounded-lg cursor-pointer">
                                <img id="profilePreview" src="#" alt="Preview">
                                <div id="uploadPlaceholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <svg class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    <p class="text-xs text-gray-500 text-center px-2" id="file-name">--Upload Profile Photo--</p>
                                </div>
                                <input type="file" class="hidden" accept="image/*" id="imageInput">
                            </label>
                        </div>
                        <button type="submit" id="registerBtn" class="btn-primary bg-emerald-600 hover:bg-emerald-700 text-white shadow-md">
                            SIGN UP
                        </button>
                    </form>
                    <div class="link-underline">
                        <a id="backToLoginLink">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- POST-LOGIN PANEL: Class + Subject selection (hidden until successful login) -->
        <div id="postLoginPanel" class="post-login-panel" style="display: none;">
            <div class="form-card">
                <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-100 mb-6 text-center">SELECT YOUR PATH</h2>
                <div class="form-label">SELECT CLASS</div>
                <div id="classSelectWrapper" class="mb-6"></div>
                <div class="form-label">SELECT SUBJECT</div>
                <div id="subjectSelectWrapper" class="mb-6"></div>
                <button id="continueSelectionBtn" class="btn-primary bg-purple-600 hover:bg-purple-700 text-white shadow-md">
                    Continue to Dashboard
                </button>
                <div class="link-underline">
                    <a id="backToLoginFromPanel">← Back to Sign In</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="customToast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 z-50 toast-notification bg-gradient-to-r from-red-600 to-red-700 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold text-base border border-red-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        // ======================== API BASE for classes/subjects ========================
        const API_BASE = "https://dilshadalmm-yosv.onrender.com";
        
        let selectedClassId = null;
        let selectedSubjectId = null;
        let currentFirebaseUser = null;
        
        // DOM elements for toggling
        const signinSection = document.getElementById('signinSection');
        const signupSection = document.getElementById('signupSection');
        const authFormsContainer = document.getElementById('authFormsContainer');
        const postLoginPanel = document.getElementById('postLoginPanel');
        const getStartedLink = document.getElementById('getStartedLink');
        const backToLoginLink = document.getElementById('backToLoginLink');
        const backToLoginFromPanel = document.getElementById('backToLoginFromPanel');
        
        // Helper: Toast
        function showToast(message, isError = true) {
            const toast = document.getElementById('customToast');
            const msgSpan = document.getElementById('toastMessage');
            if (!toast) return;
            msgSpan.innerText = message;
            if (isError) {
                toast.classList.remove('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
                toast.classList.add('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
            } else {
                toast.classList.remove('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
                toast.classList.add('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
            }
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function setButtonLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('btn-loading');
                btn.disabled = true;
                const originalText = btn.innerText;
                btn.setAttribute('data-original-text', originalText);
                btn.innerHTML = `${originalText} <span class="loader"></span>`;
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
                const original = btn.getAttribute('data-original-text');
                if (original) btn.innerText = original;
            }
        }
        
        // Toggle between Sign In and Sign Up
        function showSignIn() {
            signinSection.style.display = 'block';
            signupSection.style.display = 'none';
        }
        
        function showSignUp() {
            signinSection.style.display = 'none';
            signupSection.style.display = 'block';
        }
        
        getStartedLink.addEventListener('click', (e) => {
            e.preventDefault();
            showSignUp();
        });
        
        backToLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            showSignIn();
        });
        
        // ----- Custom Dropdown logic (identical to freeSolution) -----
        function closeAllDropdowns() {
            document.querySelectorAll('.custom-select-dropdown').forEach(dd => dd.classList.remove('show'));
            document.querySelectorAll('.custom-select-trigger').forEach(tr => tr.classList.remove('open'));
        }
        
        function buildCustomSelect(options, placeholder, selectedValue, onSelect) {
            const wrapper = document.createElement('div');
            wrapper.className = 'custom-select-wrapper';
            const trigger = document.createElement('div');
            trigger.className = 'custom-select-trigger';
            const triggerSpan = document.createElement('span');
            const selectedOption = options.find(opt => opt.value === selectedValue);
            triggerSpan.textContent = selectedOption ? selectedOption.label : placeholder;
            trigger.appendChild(triggerSpan);
            const dropdown = document.createElement('div');
            dropdown.className = 'custom-select-dropdown';
            
            if (!options.length) {
                const noOpt = document.createElement('div');
                noOpt.className = 'custom-select-option disabled';
                noOpt.textContent = 'No options available';
                noOpt.style.cursor = 'default';
                noOpt.style.opacity = '0.6';
                dropdown.appendChild(noOpt);
            } else {
                options.forEach(opt => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'custom-select-option';
                    if (selectedValue === opt.value) optDiv.classList.add('selected');
                    optDiv.textContent = opt.label;
                    optDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        triggerSpan.textContent = opt.label;
                        dropdown.classList.remove('show');
                        trigger.classList.remove('open');
                        onSelect(opt.value, opt.label);
                        dropdown.querySelectorAll('.custom-select-option').forEach(el => el.classList.remove('selected'));
                        optDiv.classList.add('selected');
                    });
                    dropdown.appendChild(optDiv);
                });
            }
            
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                closeAllDropdowns();
                dropdown.classList.add('show');
                trigger.classList.add('open');
            });
            wrapper.appendChild(trigger);
            wrapper.appendChild(dropdown);
            return wrapper;
        }
        
        async function fetchJSON(url, errorMsg = "Network error") {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`Fetch failed: ${url}`, err);
                showToast(errorMsg, true);
                return null;
            }
        }
        
        async function populateClassesDropdown() {
            const wrapper = document.getElementById('classSelectWrapper');
            if (!wrapper) return;
            wrapper.innerHTML = '<div class="loader" style="padding:0.5rem"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            const data = await fetchJSON(`${API_BASE}/classes`, "Failed to load classes");
            let options = [];
            if (data && Array.isArray(data)) {
                options = data.map(c => ({ value: c.classId || c.id, label: c.className || c.name }));
            }
            const selectComp = buildCustomSelect(options, '-- Select Class --', selectedClassId, async (classId) => {
                selectedClassId = classId;
                selectedSubjectId = null;
                await populateSubjectsDropdown(selectedClassId);
            });
            wrapper.innerHTML = '';
            wrapper.appendChild(selectComp);
        }
        
        async function populateSubjectsDropdown(classId) {
            const wrapper = document.getElementById('subjectSelectWrapper');
            if (!wrapper) return;
            if (!classId) {
                const emptySelect = buildCustomSelect([], '-- Select Class First --', null, () => {});
                wrapper.innerHTML = '';
                wrapper.appendChild(emptySelect);
                return;
            }
            wrapper.innerHTML = '<div class="loader" style="padding:0.5rem"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>';
            const data = await fetchJSON(`${API_BASE}/subjects?classId=${encodeURIComponent(classId)}`, "Failed to load subjects");
            let options = [];
            if (data && Array.isArray(data)) {
                options = data.map(s => ({ value: s.subjectId || s.id, label: s.subjectName || s.name }));
            }
            const selectComp = buildCustomSelect(options, '-- Select Subject --', selectedSubjectId, (subjectId) => {
                selectedSubjectId = subjectId;
            });
            wrapper.innerHTML = '';
            wrapper.appendChild(selectComp);
        }
        
        async function showPostLoginPanel(user) {
            currentFirebaseUser = user;
            authFormsContainer.style.display = 'none';
            postLoginPanel.style.display = 'block';
            selectedClassId = null;
            selectedSubjectId = null;
            await populateClassesDropdown();
            const emptySubject = buildCustomSelect([], '-- Select Class First --', null, () => {});
            const subjWrapper = document.getElementById('subjectSelectWrapper');
            if (subjWrapper) {
                subjWrapper.innerHTML = '';
                subjWrapper.appendChild(emptySubject);
            }
        }
        
        async function resetToLogin() {
            try {
                await window.signOut(window.auth);
            } catch(e) { console.warn(e); }
            currentFirebaseUser = null;
            selectedClassId = null;
            selectedSubjectId = null;
            authFormsContainer.style.display = 'block';
            postLoginPanel.style.display = 'none';
            showSignIn(); // ensure sign in visible
            // Clear form fields
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        function redirectToFreeSolution() {
            if (!selectedClassId || !selectedSubjectId) {
                showToast('Please select both CLASS and SUBJECT before continuing', true);
                return;
            }
            const url = `https://nepalpathshala.github.io/ultimateSolution/freeSolution.html?classId=${encodeURIComponent(selectedClassId)}&subjectId=${encodeURIComponent(selectedSubjectId)}`;
            window.location.href = url;
        }
        
        // ======================== LOGIN HANDLER ========================
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                showToast('Please fill all fields');
                return;
            }
            setButtonLoading(loginBtn, true);
            try {
                const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;
                if (!user.emailVerified) {
                    showToast('Please verify your email before logging in. Check your inbox.');
                    setButtonLoading(loginBtn, false);
                    return;
                }
                await showPostLoginPanel(user);
                setButtonLoading(loginBtn, false);
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/user-not-found')) msg = 'User not found';
                else if (msg.includes('auth/wrong-password')) msg = 'Wrong password';
                else if (msg.includes('auth/invalid-email')) msg = 'Invalid email';
                else msg = 'Login failed. Try again.';
                showToast(msg);
                setButtonLoading(loginBtn, false);
            }
        });
        
        // ======================== REGISTRATION ========================
        const imageInput = document.getElementById('imageInput');
        const profilePreview = document.getElementById('profilePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const fileNameSpan = document.getElementById('file-name');
        
        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Image too large (max 5MB)');
                    this.value = '';
                    return;
                }
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    profilePreview.src = ev.target.result;
                    profilePreview.style.display = 'block';
                    uploadPlaceholder.style.opacity = '0.3';
                };
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.textContent = '--Upload Profile Photo--';
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
            }
        });
        
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!userName || !email || !password || !confirmPassword) {
                showToast('All fields are required');
                return;
            }
            if (password !== confirmPassword) {
                showToast('Passwords do not match');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters');
                return;
            }
            setButtonLoading(registerBtn, true);
            try {
                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                const user = userCredential.user;
                await window.updateProfile(user, { displayName: userName });
                await window.sendEmailVerification(user);
                await window.signOut(window.auth);
                showToast('Account created! Verification email sent. Please verify then sign in.', false);
                registerForm.reset();
                imageInput.value = '';
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
                fileNameSpan.textContent = '--Upload Profile Photo--';
                setButtonLoading(registerBtn, false);
                showSignIn(); // switch back to sign in
                setTimeout(() => {
                    showToast('After email verification, use SIGN IN to continue.', false);
                }, 2000);
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/email-already-in-use')) msg = 'Email already registered';
                else if (msg.includes('auth/weak-password')) msg = 'Weak password (min 6 chars)';
                else msg = 'Registration failed. Try again.';
                showToast(msg);
                setButtonLoading(registerBtn, false);
            }
        });
        
        // Continue button (class+subject selection)
        document.getElementById('continueSelectionBtn').addEventListener('click', redirectToFreeSolution);
        backToLoginFromPanel.addEventListener('click', async (e) => {
            e.preventDefault();
            await resetToLogin();
        });
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-select-wrapper')) closeAllDropdowns();
        });
        
        // Initial state: only sign in visible
        showSignIn();
    </script>
</body>
</html>
