<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Solution - Auth</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Creepster&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC6NRjkwiazA-aYF4okvnLW4qpCyMg8O9E",
            authDomain: "fir-f3d53.firebaseapp.com",
            databaseURL: "https://fir-f3d53-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fir-f3d53",
            storageBucket: "fir-f3d53.firebasestorage.app",
            messagingSenderId: "683707045028",
            appId: "1:683707045028:web:93990fa0de8767dda90231"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Make auth available globally for inline handlers
        window.auth = auth;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.updateProfile = updateProfile;
        window.sendEmailVerification = sendEmailVerification;
    </script>
    <style>
        /* Hide scrollbar - same as index1.html */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: pan-y pinch-zoom;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar {
            display: none;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .custom-file-upload {
            border: 2px dashed #e2e8f0;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .custom-file-upload:hover {
            border-color: #6366f1;
            background-color: #f5f3ff;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            width: 100%;
            z-index: 50;
            max-height: 200px;
            overflow-y: auto;
        }
        .dropdown-content.show {
            display: block;
        }
        .course-option:not(:last-child) {
            border-bottom: 1px solid #f1f5f9;
        }
        #profilePreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .toast-notification {
            transition: opacity 0.25s ease-in-out, visibility 0.25s;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(4px);
        }
        .toast-notification.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <header class="mb-4 w-full max-w-5xl mx-auto px-4 pt-6">
        <img src="https://i.postimg.cc/bw2vK1BT/Blue_Minimalist.png" alt="Brand Logo" class="w-full h-auto object-contain rounded-xl" onerror="this.style.display='none'">
    </header>

    <main class="w-full max-w-5xl mx-auto px-4 pb-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            <!-- Login Section -->
            <section class="w-full md:w-1/2 p-8 md:p-12 border-b md:border-b-0 md:border-r border-gray-100">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                    <span class="w-2 h-8 bg-indigo-500 rounded-full mr-3"></span>
                    Login
                </h2>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm" required>
                    </div>
                    <!-- Custom Course Dropdown -->
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Course</label>
                        <div id="courseDropdownBtn" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-sm flex justify-between items-center cursor-pointer select-none">
                            <span id="selectedCourseText" class="text-gray-400">Select your course</span>
                        </div>
                        <input type="hidden" id="courseInput" name="course" required>
                        <div id="courseDropdownOptions" class="dropdown-content mt-1 bg-white border border-gray-200 rounded-lg shadow-lg">
                            <div class="course-option px-4 py-3 text-sm hover:bg-indigo-50 cursor-pointer" data-value="CS">Computer Science</div>
                            <div class="course-option px-4 py-3 text-sm hover:bg-indigo-50 cursor-pointer" data-value="MATH">Mathematics</div>
                            <div class="course-option px-4 py-3 text-sm hover:bg-indigo-50 cursor-pointer" data-value="PHYS">Physics</div>
                            <div class="course-option px-4 py-3 text-sm hover:bg-indigo-50 cursor-pointer" data-value="CHEM">Chemistry</div>
                        </div>
                    </div>
                    <button type="submit" id="loginBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                        Sign In
                    </button>
                </form>
            </section>

            <!-- Registration Section -->
            <section class="w-full md:w-1/2 p-8 md:p-12 bg-gray-50/50">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                    <span class="w-2 h-8 bg-emerald-500 rounded-full mr-3"></span>
                    Register
                </h2>
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">User Name</label>
                        <input type="text" id="regName" placeholder="John Doe" class="w-full px-4 py-3 rounded-lg bg-white border border-gray-200 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="regEmail" placeholder="email@example.com" class="w-full px-4 py-3 rounded-lg bg-white border border-gray-200 text-sm" required>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-white border border-gray-200 text-sm" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Re-Enter Password</label>
                            <input type="password" id="regConfirmPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-white border border-gray-200 text-sm" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Upload Profile Image</label>
                        <label class="custom-file-upload flex flex-col items-center justify-center w-full h-32 rounded-lg cursor-pointer bg-white">
                            <img id="profilePreview" src="#" alt="Preview">
                            <div id="uploadPlaceholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p class="text-xs text-gray-500 text-center px-2" id="file-name">PNG, JPG or GIF (MAX. 5MB)</p>
                            </div>
                            <input type="file" class="hidden" accept="image/*" id="imageInput">
                        </label>
                    </div>
                    <button type="submit" id="registerBtn" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition duration-200 shadow-md flex items-center justify-center">
                        Create Account
                    </button>
                </form>
            </section>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="customToast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 md:left-auto md:right-6 md:translate-x-0 z-50 toast-notification bg-gradient-to-r from-red-600 to-red-700 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold text-base border border-red-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        // -------------------- HELPER FUNCTIONS --------------------
        const API_BASE = "https://dilshadalmm-yosv.onrender.com";
        const SYNC_ENDPOINT = `${API_BASE}/api/auth/register`; // multipart endpoint

        function showToast(message, isError = true) {
            const toast = document.getElementById('customToast');
            const msgSpan = document.getElementById('toastMessage');
            if (!toast) return;
            msgSpan.innerText = message;
            if (isError) {
                toast.classList.remove('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
                toast.classList.add('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
            } else {
                toast.classList.remove('bg-gradient-to-r', 'from-red-600', 'to-red-700', 'border-red-400');
                toast.classList.add('bg-gradient-to-r', 'from-green-600', 'to-green-700', 'border-green-400');
            }
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function setButtonLoading(btn, isLoading) {
            if (isLoading) {
                btn.classList.add('btn-loading');
                btn.disabled = true;
                const originalText = btn.innerText;
                btn.setAttribute('data-original-text', originalText);
                btn.innerHTML = `${originalText} <span class="loader"></span>`;
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
                const original = btn.getAttribute('data-original-text');
                if (original) btn.innerText = original;
            }
        }

        async function syncUserWithBackend(idToken, userName = null, profileImageFile = null) {
            const formData = new FormData();
            formData.append('idToken', idToken);
            if (userName) formData.append('userName', userName);
            if (profileImageFile) formData.append('profileImage', profileImageFile);
            
            const response = await fetch(SYNC_ENDPOINT, {
                method: 'POST',
                body: formData
            });
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `HTTP ${response.status}`);
            }
            const data = await response.json();
            if (!data.success) throw new Error(data.error || 'Sync failed');
            return data.user;
        }

        // Redirect after auth (store selected course in localStorage)
        function redirectAfterAuth(selectedCourse) {
            if (selectedCourse) {
                localStorage.setItem('selectedCourse', selectedCourse);
            }
            window.location.href = 'index1.html'; // main ultimate solution page
        }

        // -------------------- IMAGE PREVIEW --------------------
        const imageInput = document.getElementById('imageInput');
        const profilePreview = document.getElementById('profilePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const fileNameSpan = document.getElementById('file-name');

        imageInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    showToast("Image too large (max 5MB)");
                    this.value = '';
                    return;
                }
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    profilePreview.src = ev.target.result;
                    profilePreview.style.display = 'block';
                    uploadPlaceholder.style.opacity = '0.3';
                };
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.textContent = "PNG, JPG or GIF (MAX. 5MB)";
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
            }
        });

        // -------------------- CUSTOM DROPDOWN (Course) --------------------
        const dropdownBtn = document.getElementById('courseDropdownBtn');
        const dropdownOptions = document.getElementById('courseDropdownOptions');
        const selectedText = document.getElementById('selectedCourseText');
        const courseInput = document.getElementById('courseInput');

        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownOptions.classList.toggle('show');
        });

        document.querySelectorAll('.course-option').forEach(option => {
            option.addEventListener('click', function(e) {
                e.stopPropagation();
                const value = this.getAttribute('data-value');
                const text = this.textContent;
                selectedText.textContent = text;
                selectedText.classList.remove('text-gray-400');
                selectedText.classList.add('text-gray-800');
                courseInput.value = value;
                dropdownOptions.classList.remove('show');
            });
        });

        window.addEventListener('click', () => {
            dropdownOptions.classList.remove('show');
        });

        // -------------------- LOGIN --------------------
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const selectedCourse = courseInput.value;
            if (!selectedCourse) {
                showToast("Please select a course");
                return;
            }
            if (!email || !password) {
                showToast("Please fill all fields");
                return;
            }
            setButtonLoading(loginBtn, true);
            try {
                const auth = window.auth;
                const userCredential = await window.signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                if (!user.emailVerified) {
                    showToast("Please verify your email before logging in. Check your inbox.");
                    setButtonLoading(loginBtn, false);
                    return;
                }
                const idToken = await user.getIdToken();
                // Sync user with backend (no image, no userName update)
                await syncUserWithBackend(idToken);
                showToast("Login successful! Redirecting...", false);
                setTimeout(() => redirectAfterAuth(selectedCourse), 1500);
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/user-not-found')) msg = "User not found";
                else if (msg.includes('auth/wrong-password')) msg = "Wrong password";
                else if (msg.includes('auth/invalid-email')) msg = "Invalid email";
                else msg = "Login failed. Try again.";
                showToast(msg);
                setButtonLoading(loginBtn, false);
            }
        });

        // -------------------- REGISTER --------------------
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const profileImage = imageInput.files[0];
            
            if (!userName || !email || !password || !confirmPassword) {
                showToast("All fields are required");
                return;
            }
            if (password !== confirmPassword) {
                showToast("Passwords do not match");
                return;
            }
            if (password.length < 6) {
                showToast("Password must be at least 6 characters");
                return;
            }
            setButtonLoading(registerBtn, true);
            try {
                const auth = window.auth;
                const userCredential = await window.createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                // Update Firebase Auth profile with displayName
                await window.updateProfile(user, { displayName: userName });
                // Send email verification
                await window.sendEmailVerification(user);
                // Get ID token
                const idToken = await user.getIdToken();
                // Sync with backend (upload image if any)
                await syncUserWithBackend(idToken, userName, profileImage || null);
                showToast("Account created! Verification email sent. Please verify then login.", false);
                // Clear form and reset
                registerForm.reset();
                imageInput.value = '';
                profilePreview.style.display = 'none';
                uploadPlaceholder.style.opacity = '1';
                fileNameSpan.textContent = "PNG, JPG or GIF (MAX. 5MB)";
                setButtonLoading(registerBtn, false);
                // Optionally auto-redirect after a few seconds? Better to tell user to verify email.
                setTimeout(() => {
                    showToast("After email verification, log in using login form.", false);
                }, 2000);
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('auth/email-already-in-use')) msg = "Email already registered";
                else if (msg.includes('auth/weak-password')) msg = "Weak password (min 6 chars)";
                else msg = "Registration failed. Try again.";
                showToast(msg);
                setButtonLoading(registerBtn, false);
            }
        });
    </script>
</body>
</html>
